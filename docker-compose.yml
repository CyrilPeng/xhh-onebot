services:
  xhh-onebot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn}
    image: xhh-onebot:latest
    container_name: xhh-onebot
    restart: unless-stopped
    command: ["start", "--config", "/app/config.json"]
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Shanghai
