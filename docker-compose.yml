services:
  xhh-onebot:
    build:
      context: .
      dockerfile: Dockerfile
    image: xhh-onebot:latest
    container_name: xhh-onebot
    restart: unless-stopped
    command: ["start", "--config", "/app/config.json"]
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Shanghai
